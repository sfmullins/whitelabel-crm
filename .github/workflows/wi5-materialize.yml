name: WI5 materialize and validate

on:
  push:
    branches:
      - WI5-Operational-Records
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wi5-materialize
  cancel-in-progress: true

jobs:
  materialize:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' || github.head_ref == 'WI5-Operational-Records')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: WI5-Operational-Records
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply WI5 integration and validate
        shell: bash
        run: |
          set +e
          {
            node scratch/wi5-idempotency.mjs
            prep_status=$?
            if [ "$prep_status" -eq 0 ]; then node scratch/wi5-patch.mjs; patch_status=$?; else patch_status=1; fi
            if [ "$patch_status" -eq 0 ]; then node scratch/wi5-hotfix.mjs; hotfix_status=$?; else hotfix_status=1; fi
            if [ "$hotfix_status" -eq 0 ]; then node scratch/wi5-hotfix2.mjs; hotfix2_status=$?; else hotfix2_status=1; fi
            if [ "$hotfix2_status" -eq 0 ]; then npm run ci:verify; verify_status=$?; else verify_status=1; fi
            echo "PREP_STATUS=$prep_status"
            echo "PATCH_STATUS=$patch_status"
            echo "HOTFIX_STATUS=$hotfix_status"
            echo "HOTFIX2_STATUS=$hotfix2_status"
            echo "VERIFY_STATUS=$verify_status"
            exit "$verify_status"
          } 2>&1 | tee scratch/wi5-validation.txt
          status=${PIPESTATUS[0]}
          echo "WI5_STATUS=$status" >> "$GITHUB_ENV"
          exit 0
      - name: Commit implementation and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "WI5: materialize operational records foundation"
            git push origin HEAD:WI5-Operational-Records
          fi
      - name: Report validation
        run: exit "$WI5_STATUS"
