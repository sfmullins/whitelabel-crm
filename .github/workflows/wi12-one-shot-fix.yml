name: WI12 one-shot source correction

on:
  push:
    branches:
      - WI12-Instance-Onboarding
    paths:
      - .github/workflows/wi12-one-shot-fix.yml

permissions:
  contents: write

jobs:
  correct-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: WI12-Instance-Onboarding
      - name: Correct generic section merge and remove one-shot workflow
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('frontend/src/pages/Onboarding.tsx')
          text = path.read_text()
          old = "const patch=<K extends keyof OnboardingConfiguration>(key:K,value:Partial<OnboardingConfiguration[K]>)=>setDraft((current)=>current?{...current,[key]:{...current[key],...value}}:current);"
          new = "const patch=<K extends keyof OnboardingConfiguration>(key:K,value:Partial<OnboardingConfiguration[K]>)=>setDraft((current)=>current?{...current,[key]:{...(current[key] as object),...value}}:current);"
          if text.count(old) != 1:
              raise SystemExit('Expected WI12 patch helper was not found exactly once')
          path.write_text(text.replace(old, new))
          PY
          rm .github/workflows/wi12-one-shot-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/Onboarding.tsx .github/workflows/wi12-one-shot-fix.yml
          git commit -m "Fix WI12 onboarding section merge typing"
          git push origin HEAD:WI12-Instance-Onboarding
