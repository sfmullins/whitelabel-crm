name: WI6-WI7 release blocker validation

on:
  push:
    branches:
      - agent/wi6-wi7-release-blockers
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-blockers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run complete verification
        id: verify
        shell: bash
        run: |
          set +e
          npm run ci:verify 2>&1 | tee release-blockers-validation.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-blockers-validation-log
          path: release-blockers-validation.log
          if-no-files-found: error
      - name: Report verification result
        run: exit "${{ steps.verify.outputs.status }}"
