name: Refresh reviewed stage dependency versions

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: refresh-stage-lock
  cancel-in-progress: true

jobs:
  refresh:
    if: github.head_ref == 'post-wi11-audit-pass-2'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Check out audit branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: post-wi11-audit-pass-2

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Refresh only drifted package versions in the reviewed lockfile
        run: npm update baseline-browser-mapping browserslist electron-to-chromium enhanced-resolve fast-uri prettier --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify refreshed lockfile
        run: |
          npm ci
          npm run audit:production
          npm ls --all

      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Reviewed lockfile already contains the staged versions."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Refresh reviewed staged dependency versions"
          git push origin HEAD:post-wi11-audit-pass-2
