name: WI4 SOW audit apply

# Final one-shot materialisation and cleanup.
on:
  push:
    branches:
      - WI4-Implementation
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wi4-sow-audit-apply
  cancel-in-progress: true

jobs:
  apply-audit:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' || github.head_ref == 'WI4-Implementation')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: WI4-Implementation
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply, verify and clean WI4 corrections
        shell: bash
        run: |
          set +e
          {
            node scratch/wi4-audit-idempotency.mjs
            prep_status=$?
            if [ "$prep_status" -eq 0 ]; then
              node scratch/wi4-audit-loader.mjs
              loader_status=$?
            else
              loader_status=1
            fi
            if [ "$loader_status" -eq 0 ]; then
              node scratch/wi4-audit-hotfix.mjs
              hotfix_status=$?
            else
              hotfix_status=1
            fi
            if [ "$prep_status" -eq 0 ] && [ "$loader_status" -eq 0 ] && [ "$hotfix_status" -eq 0 ]; then
              npm run ci:verify
              verify_status=$?
            else
              verify_status=1
            fi
            if [ "$verify_status" -eq 0 ]; then
              node scratch/wi4-final-cleanup.mjs
              cleanup_status=$?
            else
              cleanup_status=1
            fi
            echo "PREP_STATUS=$prep_status"
            echo "LOADER_STATUS=$loader_status"
            echo "HOTFIX_STATUS=$hotfix_status"
            echo "VERIFY_STATUS=$verify_status"
            echo "CLEANUP_STATUS=$cleanup_status"
            test "$prep_status" -eq 0 -a "$loader_status" -eq 0 -a "$hotfix_status" -eq 0 -a "$verify_status" -eq 0 -a "$cleanup_status" -eq 0
          } 2>&1 | tee scratch/wi4-audit-validation.txt
          status=${PIPESTATUS[0]}
          echo "AUDIT_STATUS=$status" >> "$GITHUB_ENV"
          exit 0
      - name: Commit final corrected implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "WI4: finalise second-pass SOW corrections"
            git push origin HEAD:WI4-Implementation
          fi
      - name: Report audit result
        run: exit "$AUDIT_STATUS"
