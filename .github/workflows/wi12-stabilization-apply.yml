name: WI12 stabilization patch materializer

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/wi12-stabilization-patch/**
      - .github/workflows/wi12-stabilization-apply.yml

permissions:
  contents: write

concurrency:
  group: wi12-stabilization-materializer
  cancel-in-progress: false

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'WI12-Stabilization'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out branch head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: WI12-Stabilization
          fetch-depth: 0
          show-progress: false

      - name: Verify and apply consolidated stabilization implementation
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/wi12-stabilization-patch/00 \
            .github/wi12-stabilization-patch/01 \
            .github/wi12-stabilization-patch/02 \
            .github/wi12-stabilization-patch/03 \
            .github/wi12-stabilization-patch/04 \
            .github/wi12-stabilization-patch/05 \
            .github/wi12-stabilization-patch/06 \
            | base64 --decode \
            | gzip --decompress \
            > "${RUNNER_TEMP}/wi12-stabilization.patch"
          echo "15258ecf858d942e07a4aded6c4107b118b53018b4cf5f785a257fe48ba9b935  ${RUNNER_TEMP}/wi12-stabilization.patch" | sha256sum --check
          git apply --check "${RUNNER_TEMP}/wi12-stabilization.patch"
          git apply "${RUNNER_TEMP}/wi12-stabilization.patch"
          rm -rf .github/wi12-stabilization-patch
          rm -f .github/workflows/wi12-stabilization-apply.yml
          rm -f .github/workflows/wi12-stabilization-export.yml
          git add -A

      - name: Materialize final Git tree and commit
        id: materialize
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          repository = os.environ['GITHUB_REPOSITORY']
          base_commit = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()

          def gh_api(endpoint: str, payload: dict | None = None) -> dict:
              command = ['gh', 'api', endpoint]
              if payload is not None:
                  command += ['--method', 'POST', '--input', '-']
                  encoded = json.dumps(payload, separators=(',', ':')).encode()
              else:
                  encoded = None
              result = subprocess.run(command, input=encoded, stdout=subprocess.PIPE, stderr=subprocess.PIPE, check=True)
              return json.loads(result.stdout)

          base_tree = gh_api(f'repos/{repository}/git/commits/{base_commit}')['tree']['sha']
          raw_paths = subprocess.check_output(['git', 'diff', '--cached', '--name-only', '-z'])
          paths = [item.decode() for item in raw_paths.split(b'\0') if item]
          entries: list[dict] = []

          for path in paths:
              exists = subprocess.run(['git', 'cat-file', '-e', f':{path}'], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL).returncode == 0
              if not exists:
                  entries.append({'path': path, 'mode': '100644', 'type': 'blob', 'sha': None})
                  continue
              index_row = subprocess.check_output(['git', 'ls-files', '-s', '--', path], text=True).strip()
              mode = index_row.split()[0]
              content = subprocess.check_output(['git', 'show', f':{path}'])
              import base64
              blob = gh_api(f'repos/{repository}/git/blobs', {'content': base64.b64encode(content).decode(), 'encoding': 'base64'})
              entries.append({'path': path, 'mode': mode, 'type': 'blob', 'sha': blob['sha']})

          tree = gh_api(f'repos/{repository}/git/trees', {'base_tree': base_tree, 'tree': entries})
          commit = gh_api(f'repos/{repository}/git/commits', {
              'message': 'fix: stabilize WI12 onboarding and development runtime',
              'tree': tree['sha'],
              'parents': [base_commit],
          })
          pathlib.Path(os.environ['RUNNER_TEMP'], 'wi12-final-commit.txt').write_text(commit['sha'] + '\n')
          print(f"Materialized WI12 stabilization commit: {commit['sha']}")
          PY

      - name: Upload final commit reference
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wi12-stabilization-final-commit
          path: ${{ runner.temp }}/wi12-final-commit.txt
          retention-days: 1
