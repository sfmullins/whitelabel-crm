name: Temporary remove unused onboarding icon

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  correct-source:
    if: github.head_ref == 'WI12-Instance-Onboarding'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove exact unused import and commit
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('frontend/src/features/onboarding/ProvisioningWorkspace.tsx')
          text = path.read_text()
          old = 'AlertCircle,ArrowRight,Building2'
          new = 'AlertCircle,Building2'
          if old not in text:
              raise SystemExit('Expected unused ArrowRight import was not found')
          updated = text.replace(old, new, 1)
          if old in updated:
              raise SystemExit('More than one ArrowRight import occurrence remains')
          path.write_text(updated)
          PY
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/src/features/onboarding/ProvisioningWorkspace.tsx
          git commit -m 'Remove unused onboarding icon import'
          git push origin HEAD:${GITHUB_HEAD_REF}
