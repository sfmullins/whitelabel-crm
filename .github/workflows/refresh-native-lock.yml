name: Refresh native dependency lock

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-native-dependency-lock
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          ref: docs/record-wi11-completion

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate dependency lock
        id: regenerate_lock
        continue-on-error: true
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund > "$RUNNER_TEMP/native-lock.log" 2>&1

      - name: Upload native lock diagnostics
        if: steps.regenerate_lock.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: native-lock-failure
          path: ${{ runner.temp }}/native-lock.log
          retention-days: 3

      - name: Enforce native lock regeneration
        if: steps.regenerate_lock.outcome == 'failure'
        run: |
          cat "$RUNNER_TEMP/native-lock.log"
          exit 1

      - name: Commit regenerated dependency lock
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Dependency lock is current."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "Refresh native dependency lock"
            git pull --rebase origin docs/record-wi11-completion
            git push origin HEAD:docs/record-wi11-completion
          fi

      - name: Install audited graph
        run: npm ci

      - name: Regenerate third-party notices
        run: node scratch/generate-licenses.js

      - name: Commit refreshed third-party notices
        run: |
          if git diff --quiet -- THIRD_PARTY_LICENSES.txt; then
            echo "Third-party notices are current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add THIRD_PARTY_LICENSES.txt
          git commit -m "Refresh native dependency notices"
          git pull --rebase origin docs/record-wi11-completion
          git push origin HEAD:docs/record-wi11-completion
