name: Refresh native dependency lock

on:
  push:
    branches: [docs/record-wi11-completion]

permissions:
  contents: write

concurrency:
  group: refresh-native-dependency-lock
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          ref: docs/record-wi11-completion

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate dependency lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install audited graph
        run: npm ci

      - name: Regenerate third-party notices
        run: node scratch/generate-licenses.js

      - name: Commit deterministic dependency artifacts
        run: |
          if git diff --quiet -- package-lock.json THIRD_PARTY_LICENSES.txt; then
            echo "Dependency artifacts are current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json THIRD_PARTY_LICENSES.txt
          git commit -m "Refresh native dependency lock and notices"
          git pull --rebase origin docs/record-wi11-completion
          git push origin HEAD:docs/record-wi11-completion
