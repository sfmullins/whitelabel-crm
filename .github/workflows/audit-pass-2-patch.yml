name: Apply second-pass audit patch

on:
  push:
    branches: [post-wi11-audit-pass-2]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: audit-pass-2-patch
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.head_ref == 'post-wi11-audit-pass-2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out audit branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: post-wi11-audit-pass-2

      - name: Apply deterministic patch
        run: python3 scratch/apply-audit-pass-2.py

      - name: Commit and push patch
        id: commit_patch
        continue-on-error: true
        run: |
          set -x
          git status --short
          git add -A
          if git diff --cached --quiet; then
            echo "Audit patch already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Fix second-pass audit findings"
          git push origin HEAD:post-wi11-audit-pass-2
        shell: bash

      - name: Capture patch writer diagnostics
        if: steps.commit_patch.outcome == 'failure'
        run: |
          {
            git status --short
            git log -3 --oneline
            git remote -v
          } > "$RUNNER_TEMP/audit-patch-writer.log" 2>&1

      - name: Upload patch writer diagnostics
        if: steps.commit_patch.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audit-patch-writer-failure
          path: ${{ runner.temp }}/audit-patch-writer.log
          retention-days: 3

      - name: Enforce patch writer
        if: steps.commit_patch.outcome == 'failure'
        run: exit 1
