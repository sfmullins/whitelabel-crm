name: WI8-WI9 diagnostics

on:
  push:
    branches:
      - WI8-WI9-reporting-multiuser-hardening
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wi8-wi9-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w shared
      - name: Capture test output
        id: test
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee wi8-wi9-test.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wi8-wi9-test-log
          path: wi8-wi9-test.log
          if-no-files-found: error
      - name: Report test result
        run: exit "${{ steps.test.outputs.status }}"
