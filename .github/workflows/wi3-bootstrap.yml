name: WI3 final workspace validation

on:
  push:
    branches:
      - codex/wi3-normalised-activity-notes-v2
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wi3-final-workspace
  cancel-in-progress: true

jobs:
  validate-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: codex/wi3-normalised-activity-notes-v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Finalise customer activity workspace
        run: node scratch/wi3-postfix.mjs

      - name: Validate WI3
        run: npm run ci:verify

      - name: Commit final workspace changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/CustomerWorkspace.tsx
          if ! git diff --cached --quiet; then
            git commit -m "WI3: finalise customer activity workspace"
            git push origin HEAD:codex/wi3-normalised-activity-notes-v2
          fi
