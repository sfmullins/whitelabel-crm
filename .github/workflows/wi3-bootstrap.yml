name: WI3 final workspace validation

on:
  push:
    branches:
      - codex/wi3-normalised-activity-notes-v2
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wi3-final-workspace
  cancel-in-progress: true

jobs:
  validate-and-commit:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' || github.head_ref == 'codex/wi3-normalised-activity-notes-v2')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: codex/wi3-normalised-activity-notes-v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Finalise customer activity workspace
        run: node scratch/wi3-postfix.mjs

      - name: Validate WI3
        shell: bash
        run: |
          set +e
          npm run ci:verify 2>&1 | tee scratch/wi3-final-validation.txt
          validation_status=${PIPESTATUS[0]}
          echo "VALIDATION_STATUS=${validation_status}" >> "$GITHUB_ENV"
          exit 0

      - name: Commit workspace and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/pages/CustomerWorkspace.tsx scratch/wi3-final-validation.txt
          git commit -m "WI3: finalise customer activity workspace"
          git push origin HEAD:codex/wi3-normalised-activity-notes-v2

      - name: Report validation result
        run: exit "$VALIDATION_STATUS"
