name: WI5 finalize

on:
  push:
    branches:
      - WI5-Operational-Records
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wi5-finalize
  cancel-in-progress: true

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: WI5-Operational-Records
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify final implementation
        run: npm run ci:verify
      - name: Remove temporary implementation machinery
        run: |
          rm -f .github/workflows/wi5-materialize.yml
          rm -f .github/workflows/wi5-finalize.yml
          rm -f scratch/wi5-patch.mjs
          rm -f scratch/wi5-idempotency.mjs
          rm -f scratch/wi5-hotfix.mjs
          rm -f scratch/wi5-hotfix2.mjs
          rm -f scratch/wi5-hotfix3.mjs
          rm -f scratch/wi5-validation.txt
      - name: Commit clean WI5 branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "WI5: remove temporary implementation scaffolding"
          git push origin HEAD:WI5-Operational-Records
