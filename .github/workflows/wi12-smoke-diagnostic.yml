name: WI12 smoke diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/wi12-smoke-diagnostic.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'WI12-Stabilization'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out PR head
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: WI12-Stabilization
          fetch-depth: 1
      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Build required workspaces
        run: npm run build -w shared && npm run build -w backend && npm run build -w desktop
      - name: Run WI12 smoke with complete diagnostics
        id: smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run wi12:smoke 2>&1 | tee "$RUNNER_TEMP/wi12-smoke.log"
      - name: Upload WI12 smoke diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wi12-smoke-diagnostics
          path: ${{ runner.temp }}/wi12-smoke.log
          retention-days: 1
      - name: Enforce WI12 smoke
        if: steps.smoke.outcome != 'success'
        run: exit 1
