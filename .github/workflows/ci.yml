name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Governance quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependency installation
        run: npm ci

      - name: Complete build, test, migration and WI4-WI10 verification
        run: npm run ci:verify

      - name: Clean repository verification
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [ -n "$status" ]; then
            echo "Repository changed during CI:"
            printf '%s\n' "$status"
            git diff --stat
            git diff
            exit 1
          fi
