name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Governance quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependency installation
        run: npm ci

      - name: Workspace build
        run: npm run build

      - name: Backend and frontend tests
        run: npm test

      - name: Database migration smoke
        run: npm run db:smoke

      - name: WI4-WI7 regression smoke
        run: |
          npm run wi4:smoke
          npm run wi5:smoke
          npm run wi6:smoke
          npm run wi7:smoke

      - name: WI8-WI10 regression smoke
        run: |
          npm run wi8-wi9:smoke
          npm run wi10:smoke

      - name: WI11 extension smoke
        run: npm run wi11:smoke

      - name: Desktop packaging preflight
        run: npm run desktop:preflight

      - name: Clean repository verification
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [ -n "$status" ]; then
            echo "Repository changed during CI:"
            printf '%s\n' "$status"
            git diff --stat
            git diff
            exit 1
          fi
