name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Governance quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Dependency installation
        run: npm ci

      - name: Workspace build
        id: workspace_build
        continue-on-error: true
        run: npm run build > "$RUNNER_TEMP/workspace-build.log" 2>&1

      - name: Upload workspace build diagnostics
        if: steps.workspace_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: workspace-build-failure
          path: ${{ runner.temp }}/workspace-build.log
          retention-days: 3

      - name: Enforce workspace build
        if: steps.workspace_build.outcome == 'failure'
        run: |
          tail -n 120 "$RUNNER_TEMP/workspace-build.log"
          exit 1

      - name: NPM and syntax hygiene
        id: npm_hygiene
        continue-on-error: true
        run: npm run check:npm-hygiene > "$RUNNER_TEMP/npm-hygiene.log" 2>&1

      - name: Upload npm hygiene diagnostics
        if: steps.npm_hygiene.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-hygiene-failure
          path: ${{ runner.temp }}/npm-hygiene.log
          retention-days: 3

      - name: Enforce npm and syntax hygiene
        if: steps.npm_hygiene.outcome == 'failure'
        run: |
          tail -n 240 "$RUNNER_TEMP/npm-hygiene.log"
          exit 1

      - name: Production dependency audit
        id: production_audit
        continue-on-error: true
        run: npm run audit:production > "$RUNNER_TEMP/production-audit.log" 2>&1

      - name: Upload production dependency diagnostics
        if: steps.production_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-dependency-audit-failure
          path: ${{ runner.temp }}/production-audit.log
          retention-days: 3

      - name: Enforce production dependency audit
        if: steps.production_audit.outcome == 'failure'
        run: |
          tail -n 240 "$RUNNER_TEMP/production-audit.log"
          exit 1

      - name: Backend and frontend tests
        id: workspace_tests
        continue-on-error: true
        run: npm test > "$RUNNER_TEMP/workspace-tests.log" 2>&1

      - name: Upload test diagnostics
        if: steps.workspace_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: workspace-test-failure
          path: ${{ runner.temp }}/workspace-tests.log
          retention-days: 3

      - name: Enforce backend and frontend tests
        if: steps.workspace_tests.outcome == 'failure'
        run: |
          tail -n 180 "$RUNNER_TEMP/workspace-tests.log"
          exit 1

      - name: Database migration smoke
        run: npm run db:smoke

      - name: WI4-WI7 regression smoke
        run: |
          npm run wi4:smoke
          npm run wi5:smoke
          npm run wi6:smoke
          npm run wi7:smoke

      - name: WI8-WI10 regression smoke
        run: |
          npm run wi8-wi9:smoke
          npm run wi10:smoke

      - name: WI11 extension smoke
        run: npm run wi11:smoke

      - name: Desktop packaging preflight
        run: npm run desktop:preflight

      - name: Clean repository verification
        id: clean_repository
        continue-on-error: true
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [ -z "$status" ]; then
            echo "Repository remained clean."
            exit 0
          fi
          {
            echo "Repository changed during CI:"
            printf '%s\n' "$status"
            git diff --stat
            git diff
          } > "$RUNNER_TEMP/repository-clean.log"
          mkdir -p "$RUNNER_TEMP/repository-clean-files"
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            mkdir -p "$RUNNER_TEMP/repository-clean-files/$(dirname "$file")"
            cp "$file" "$RUNNER_TEMP/repository-clean-files/$file"
          done < <(git diff --name-only)
          exit 1

      - name: Upload clean repository diagnostics
        if: steps.clean_repository.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: repository-clean-failure
          path: |
            ${{ runner.temp }}/repository-clean.log
            ${{ runner.temp }}/repository-clean-files
          retention-days: 3

      - name: Enforce clean repository verification
        if: steps.clean_repository.outcome == 'failure'
        run: |
          cat "$RUNNER_TEMP/repository-clean.log"
          exit 1
