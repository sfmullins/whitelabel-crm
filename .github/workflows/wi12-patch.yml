name: Temporary WI12 source patch

on:
  push:
    branches:
      - WI12-Instance-Onboarding

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: WI12-Instance-Onboarding
      - name: Narrow onboarding configuration patch keys
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('frontend/src/pages/Onboarding.tsx')
          text = path.read_text()
          marker = "type SectionKey='overview'|'deployment'|'identity'|'branding'|'locale'|'terminology'|'operations'|'communications'|'security'|'employees'|'review';"
          replacement = marker + "\ntype ConfigSection=Exclude<keyof OnboardingConfiguration,'schemaVersion'>;"
          if 'type ConfigSection=' not in text:
              if marker not in text:
                  raise SystemExit('Section marker was not found')
              text = text.replace(marker, replacement, 1)
          text = text.replace('<K extends keyof OnboardingConfiguration>', '<K extends ConfigSection>')
          path.write_text(text)
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add frontend/src/pages/Onboarding.tsx
          git commit -m "Fix onboarding draft patch typing"
          git push origin HEAD:WI12-Instance-Onboarding
