name: WI12 stabilization source export

on:
  push:
    branches:
      - WI12-Stabilization
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - name: Build source archive
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=node_modules --exclude='desktop/out' -czf "$RUNNER_TEMP/whitelabel-crm-source.tar.gz" .

      - name: Upload source archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wi12-stabilization-source
          path: ${{ runner.temp }}/whitelabel-crm-source.tar.gz
          retention-days: 1
