name: Repository audit

on:
  push:
    branches: [docs/record-wi11-completion]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture production dependency audit
        run: npm audit --omit=dev --json > production-audit.json || true

      - name: Capture complete dependency audit
        run: npm audit --json > complete-audit.json || true

      - name: Capture outdated dependency report
        run: npm outdated --json > outdated.json || true

      - name: Upload repository audit reports
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-reports
          path: |
            production-audit.json
            complete-audit.json
            outdated.json
          retention-days: 3
