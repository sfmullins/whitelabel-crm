name: Repository audit

on:
  push:
    branches: [docs/record-wi11-completion]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repository-audit-lock
  cancel-in-progress: true

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          ref: docs/record-wi11-completion

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate dependency lock
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit regenerated lock when changed
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Dependency lock is current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Regenerate audited dependency lock"
          git pull --rebase origin docs/record-wi11-completion
          git push origin HEAD:docs/record-wi11-completion

      - name: Install regenerated dependency graph
        run: npm ci

      - name: Capture production dependency audit
        run: npm audit --omit=dev --json > production-audit.json || true

      - name: Capture complete dependency audit
        run: npm audit --json > complete-audit.json || true

      - name: Capture outdated dependency report
        run: npm outdated --json > outdated.json || true

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit-reports
          path: |
            production-audit.json
            complete-audit.json
            outdated.json
          retention-days: 3
