name: WI7 validation

on:
  push:
    branches:
      - WI7-Communications-Hub
  pull_request:
    branches:
      - WI6-Connected-Communications
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wi7-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.head_ref == 'WI7-Communications-Hub'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run full WI7 verification
        run: npm run ci:verify
