name: Refresh license inventory

on:
  push:
    branches: [docs/record-wi11-completion]

permissions:
  contents: write

concurrency:
  group: refresh-license-inventory
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          ref: docs/record-wi11-completion

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate third-party notices
        run: node scratch/generate-licenses.js

      - name: Commit deterministic notice inventory
        run: |
          if git diff --quiet -- THIRD_PARTY_LICENSES.txt; then
            echo "Third-party notice inventory is current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add THIRD_PARTY_LICENSES.txt
          git commit -m "Refresh third-party license inventory"
          git pull --rebase origin docs/record-wi11-completion
          git push origin HEAD:docs/record-wi11-completion
