name: WI6 materialize and validate

on:
  push:
    branches:
      - WI6-Connected-Communications
  pull_request:
    branches:
      - WI5-Operational-Records
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wi6-materialize
  cancel-in-progress: true

jobs:
  materialize:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' || github.head_ref == 'WI6-Connected-Communications')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: WI6-Connected-Communications
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply WI6 integration and validate
        shell: bash
        run: |
          set +e
          {
            node scratch/wi6-patch.mjs
            patch_status=$?
            if [ "$patch_status" -eq 0 ]; then npm run ci:verify; verify_status=$?; else verify_status=1; fi
            echo "PATCH_STATUS=$patch_status"
            echo "VERIFY_STATUS=$verify_status"
            exit "$verify_status"
          } 2>&1 | tee scratch/wi6-validation.txt
          status=${PIPESTATUS[0]}
          echo "WI6_STATUS=$status" >> "$GITHUB_ENV"
          exit 0
      - name: Commit implementation and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "WI6: materialize connected communications"
            git push origin HEAD:WI6-Connected-Communications
          fi
      - name: Report validation
        run: exit "$WI6_STATUS"
