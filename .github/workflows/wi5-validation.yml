name: WI5 validation

on:
  push:
    branches:
      - WI5-Operational-Records
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wi5-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.head_ref == 'WI5-Operational-Records'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci:verify
