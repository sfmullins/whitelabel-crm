name: WI13 foundation installer

on:
  push:
    branches:
      - WI13-Enterprise-Release

permissions:
  contents: write

concurrency:
  group: wi13-foundation-installer
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: WI13-Enterprise-Release
          fetch-depth: 0

      - name: Apply coherent release-foundation commit
        shell: bash
        env:
          PATCH_GZIP_BASE64: 
        run: |
          set -euo pipefail
          printf '%s' "${PATCH_GZIP_BASE64}" | base64 --decode | gzip --decompress > "${RUNNER_TEMP}/wi13.patch"
          git apply --index "${RUNNER_TEMP}/wi13.patch"
          rm .github/workflows/wi13-source-export.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "WI13: establish release contract and metadata"
          git push origin HEAD:WI13-Enterprise-Release
