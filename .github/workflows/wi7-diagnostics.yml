name: WI7 diagnostics

on:
  push:
    branches:
      - WI7-Communications-Hub
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wi7-diagnostics
  cancel-in-progress: true

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: WI7-Communications-Hub
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply final type conversions and capture verification
        shell: bash
        run: |
          set +e
          node scratch/wi7-typefix2.mjs 2>&1 | tee scratch/wi7-validation.txt
          patch_status=${PIPESTATUS[0]}
          if [ "$patch_status" -eq 0 ]; then
            npm run ci:verify 2>&1 | tee -a scratch/wi7-validation.txt
            verify_status=${PIPESTATUS[0]}
          else
            verify_status=1
          fi
          echo "WI7_STATUS=$verify_status" >> "$GITHUB_ENV"
          exit 0
      - name: Commit fixes and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "WI7: apply final type conversions"
            git push origin HEAD:WI7-Communications-Hub
          fi
      - name: Report result
        run: exit "$WI7_STATUS"
