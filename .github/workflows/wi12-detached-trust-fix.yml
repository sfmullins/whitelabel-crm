name: Temporary WI12 detached trust correction

on:
  push:
    branches:
      - WI12-Instance-Onboarding

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: WI12-Instance-Onboarding
      - name: Apply detached trust corrections
        run: |
          python3 - <<'PY'
          from pathlib import Path

          onboarding = Path('frontend/src/pages/Onboarding.tsx')
          text = onboarding.read_text()
          old = "  const downloadProfile=()=>{if(!profile)return;const blob=new Blob([JSON.stringify(profile,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const anchor=document.createElement('a');anchor.href=url;anchor.download=`${profile.profile.businessIdentity.displayName.toLowerCase().replace(/[^a-z0-9]+/g,'-')||'crm'}.crmdeploy.json`;anchor.click();URL.revokeObjectURL(url);};"
          new = "  const downloadProfile=()=>{if(!profile)return;const base=profile.profile.businessIdentity.displayName.toLowerCase().replace(/[^a-z0-9]+/g,'-')||'crm';const download=(content:string,fileName:string,type:string)=>{const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const anchor=document.createElement('a');anchor.href=url;anchor.download=fileName;anchor.click();URL.revokeObjectURL(url);};download(JSON.stringify(profile,null,2),`${base}.crmdeploy.json`,'application/json');window.setTimeout(()=>download(profile.publicKey,`${base}.crmdeploy.json.pub`,'text/plain'),100);setMessage('The signed profile and detached public-key trust anchor were downloaded. WI13 must package both files.');};"
          if old not in text:
              raise SystemExit('Onboarding download function not found')
          text = text.replace(old, new, 1).replace('Download deployment profile</Button>', 'Download deployment files</Button>')
          onboarding.write_text(text)

          repository = Path('backend/src/infrastructure/database/OnboardingRepository.ts')
          text = repository.read_text()
          old = "  static verifySignedProfile(value:unknown):SignedDeploymentProfile{\n    const envelope=SignedDeploymentProfileSchema.parse(value);const profileJson=canonicalJson(envelope.profile);if(sha256(profileJson)!==envelope.checksum)throw new ValidationError('Deployment profile checksum verification failed');const publicKey=crypto.createPublicKey({key:Buffer.from(envelope.publicKey,'base64'),format:'der',type:'spki'});if(!crypto.verify(null,Buffer.from(profileJson,'utf8'),publicKey,Buffer.from(envelope.signature,'base64')))throw new ValidationError('Deployment profile signature verification failed');if(containsSecretKey(envelope.profile))throw new ValidationError('Deployment profile contains prohibited secret-bearing fields');return envelope;\n  }"
          new = "  static verifySignedProfile(value:unknown,expectedPublicKey?:string):SignedDeploymentProfile{\n    const envelope=SignedDeploymentProfileSchema.parse(value);if(expectedPublicKey&&envelope.publicKey!==expectedPublicKey)throw new ValidationError('Deployment profile signing key does not match the detached trust anchor');const profileJson=canonicalJson(envelope.profile);if(sha256(profileJson)!==envelope.checksum)throw new ValidationError('Deployment profile checksum verification failed');const trustedKey=expectedPublicKey??envelope.publicKey;const publicKey=crypto.createPublicKey({key:Buffer.from(trustedKey,'base64'),format:'der',type:'spki'});if(!crypto.verify(null,Buffer.from(profileJson,'utf8'),publicKey,Buffer.from(envelope.signature,'base64')))throw new ValidationError('Deployment profile signature verification failed');if(containsSecretKey(envelope.profile))throw new ValidationError('Deployment profile contains prohibited secret-bearing fields');return envelope;\n  }"
          if old not in text:
              raise SystemExit('Backend profile verifier not found')
          repository.write_text(text.replace(old, new, 1))

          tests = Path('backend/src/test/wi12-onboarding.spec.ts')
          text = tests.read_text()
          if "import crypto from 'node:crypto';" not in text:
              text = text.replace("import fs from 'node:fs';", "import crypto from 'node:crypto';\nimport fs from 'node:fs';", 1)
          marker = "    const tampered=structuredClone(second.deploymentProfile);tampered.profile.businessIdentity.displayName='Attacker';expect(()=>OnboardingRepository.verifySignedProfile(tampered)).toThrow('checksum');"
          addition = marker + "\n    const attacker=crypto.generateKeyPairSync('ed25519');const attackerProfile=structuredClone(second.deploymentProfile.profile);attackerProfile.businessIdentity.displayName='Re-signed attacker profile';const attackerJson=canonicalJson(attackerProfile);const resigned={profile:attackerProfile,checksum:crypto.createHash('sha256').update(attackerJson).digest('hex'),signature:crypto.sign(null,Buffer.from(attackerJson),attacker.privateKey).toString('base64'),publicKey:attacker.publicKey.export({format:'der',type:'spki'}).toString('base64'),algorithm:'Ed25519' as const};expect(()=>OnboardingRepository.verifySignedProfile(resigned,second.deploymentProfile.publicKey)).toThrow('detached trust anchor');"
          if marker not in text:
              raise SystemExit('WI12 tamper test marker not found')
          text = text.replace(marker, addition, 1)
          tests.write_text(text)

          replacements = {
            'docs/onboarding/DEPLOYMENT-PROFILES.md': [
              ('The packaged profile acts as the managed client\'s trust anchor.', 'The packaged profile is verified against a detached instance public-key trust anchor. WI13 must place that independently acquired key beside the profile in the signed application package.'),
              ('resources/deployment-profile.crmdeploy.json\n```', 'resources/deployment-profile.crmdeploy.json\nresources/deployment-profile-public-key.txt\n```'),
              ('For controlled development, `CRM_DEPLOYMENT_PROFILE` may point to an explicit profile file.', 'For controlled development, `CRM_DEPLOYMENT_PROFILE` may point to an explicit profile file and `CRM_DEPLOYMENT_PUBLIC_KEY` must provide its detached key or key-file path. A `<profile>.pub` sidecar is also accepted.')
            ],
            'docs/onboarding/MANAGED-CLIENTS.md': [
              ('1. Load the packaged deployment profile.\n2. Validate schema and size limits.', '1. Load the packaged deployment profile and detached public-key trust anchor.\n2. Validate schema and size limits.'),
              ('4. Verify the Ed25519 signature.', '4. Require the profile key to match the detached trust anchor and verify the Ed25519 signature.')
            ],
            'docs/ARCHITECTURE.md': [
              ('The packaged profile is the managed client\'s trust anchor. Remote refresh cannot silently replace it.', 'The packaged detached public key is the managed client\'s trust anchor. The profile must match that key, and remote refresh cannot silently replace it.')
            ],
            'docs/work-items/WI12.md': [
              ('the client validates a packaged Ed25519-signed profile;', 'the client validates a packaged Ed25519-signed profile against a detached instance public-key trust anchor;')
            ]
          }
          for filename, pairs in replacements.items():
              path = Path(filename)
              value = path.read_text()
              for old_text, new_text in pairs:
                  if old_text not in value:
                      raise SystemExit(f'Documentation marker not found in {filename}: {old_text}')
                  value = value.replace(old_text, new_text, 1)
              path.write_text(value)

          Path('.github/workflows/wi12-detached-trust-fix.yml').unlink()
          PY
      - name: Commit correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Harden WI12 with detached deployment trust anchors"
          git push origin HEAD:WI12-Instance-Onboarding
