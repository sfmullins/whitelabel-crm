name: Apply backup cryptography v2 patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-backup-crypto-v2
  cancel-in-progress: true

jobs:
  apply:
    if: github.head_ref == 'post-wi11-audit-pass-2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out audit branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: post-wi11-audit-pass-2

      - name: Apply backup cryptography patch
        id: apply_patch
        continue-on-error: true
        run: python3 scratch/apply-backup-crypto-v2.py > "$RUNNER_TEMP/backup-crypto-patch.log" 2>&1

      - name: Upload patch diagnostics
        if: steps.apply_patch.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backup-crypto-patch-failure
          path: ${{ runner.temp }}/backup-crypto-patch.log
          retention-days: 3

      - name: Enforce patch application
        if: steps.apply_patch.outcome == 'failure'
        run: |
          cat "$RUNNER_TEMP/backup-crypto-patch.log"
          exit 1

      - name: Commit and push patch
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Backup cryptography patch already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Harden backup password derivation and archive authentication"
          git push origin HEAD:post-wi11-audit-pass-2
