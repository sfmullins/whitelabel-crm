version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Dublin
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor
      development-tooling:
        dependency-type: development
        update-types:
          - patch
          - minor
    labels:
      - dependencies
